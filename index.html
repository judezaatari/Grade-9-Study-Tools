<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Grade 9 English — Flashcards</title> <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📖</text></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0f0e17;
      --surface:  #1a1927;
      --surface2: #22203a;
      --accent:   #e8b86d;
      --accent2:  #a78bfa;
      --text:     #f0eee8;
      --muted:    #8e8ba0;
      --border:   rgba(255,255,255,0.08);
      --radius:   18px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1.25rem 4rem;
    }

    /* subtle noise overlay */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events: none; z-index: 0;
    }

    .wrapper { width: 100%; max-width: 680px; position: relative; z-index: 1; }

    /* ── HEADER ─────────────────────────── */
    header { text-align: center; margin-bottom: 2.5rem; }
    header .eyebrow {
      font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase;
      color: var(--accent); font-weight: 500; margin-bottom: 0.5rem;
    }
    header h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.8rem, 5vw, 2.6rem);
      font-weight: 700; line-height: 1.2;
      background: linear-gradient(135deg, var(--text) 40%, var(--accent) 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    header .subtitle { font-size: 13px; color: var(--muted); margin-top: 0.4rem; }

    /* ── TOOLBAR ────────────────────────── */
    .toolbar {
      display: flex; align-items: center; justify-content: space-between;
      flex-wrap: wrap; gap: 10px; margin-bottom: 1.2rem;
    }
    .tabs { display: flex; gap: 6px; flex-wrap: wrap; }
    .tab {
      font-size: 12px; font-weight: 500; padding: 5px 14px;
      border-radius: 999px; border: 1px solid var(--border);
      background: transparent; color: var(--muted); cursor: pointer;
      transition: all 0.18s; font-family: 'DM Sans', sans-serif;
    }
    .tab:hover { border-color: var(--accent2); color: var(--text); }
    .tab.active {
      background: var(--accent2); border-color: var(--accent2);
      color: #fff; font-weight: 500;
    }

    .right-tools { display: flex; align-items: center; gap: 10px; }
    .shuffle-btn {
      font-size: 13px; font-weight: 500; padding: 6px 16px;
      border-radius: 999px; border: 1px solid var(--border);
      background: var(--surface2); color: var(--text); cursor: pointer;
      transition: all 0.18s; font-family: 'DM Sans', sans-serif;
    }
    .shuffle-btn:hover { background: var(--surface); border-color: var(--accent); color: var(--accent); }
    .progress {
      font-size: 13px; color: var(--muted); white-space: nowrap;
      font-variant-numeric: tabular-nums;
    }

    /* ── CARD ───────────────────────────── */
    .card-area { perspective: 1400px; margin-bottom: 1rem; }
    .card-wrap {
      width: 100%; min-height: 240px; position: relative;
      transform-style: preserve-3d;
      transition: transform 0.55s cubic-bezier(.4,0,.2,1);
      cursor: pointer; user-select: none;
    }
    .card-wrap.flipped { transform: rotateY(180deg); }

    .card-face {
      position: absolute; inset: 0; min-height: 240px;
      backface-visibility: hidden; -webkit-backface-visibility: hidden;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 2.25rem 2.75rem; text-align: center;
    }
    .card-face.front {
      background: linear-gradient(145deg, var(--surface), var(--surface2));
      box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 1px 0 rgba(255,255,255,0.06) inset;
    }
    .card-face.back {
      transform: rotateY(180deg);
      background: linear-gradient(145deg, #1e1b3a, #251f40);
      box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 1px 0 rgba(255,255,255,0.06) inset;
    }

    .card-label {
      font-size: 10px; font-weight: 500; letter-spacing: 0.18em;
      text-transform: uppercase; color: var(--accent); margin-bottom: 1.1rem;
    }
    .card-face.back .card-label { color: var(--accent2); }

    .card-category {
      font-size: 11px; color: var(--muted); margin-top: 1.25rem;
      background: rgba(255,255,255,0.05);
      padding: 3px 10px; border-radius: 999px;
    }
    .card-q {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1rem, 3vw, 1.25rem);
      font-weight: 500; color: var(--text); line-height: 1.5;
    }
    .card-a {
      font-size: 14.5px; color: var(--text); line-height: 1.75;
    }

    /* tap/click ripple indicator */
    .flip-hint {
      font-size: 11px; color: var(--muted); text-align: center;
      margin-bottom: 1.25rem; letter-spacing: 0.05em;
    }
    .flip-hint span { opacity: 0.5; }

    /* ── NAVIGATION ─────────────────────── */
    .nav-row {
      display: flex; align-items: center; justify-content: center;
      gap: 14px; margin-bottom: 1.25rem;
    }
    .nav-btn {
      display: flex; align-items: center; gap: 6px;
      font-size: 14px; font-weight: 500; padding: 9px 24px;
      border-radius: 999px; border: 1px solid var(--border);
      background: var(--surface2); color: var(--text); cursor: pointer;
      transition: all 0.18s; font-family: 'DM Sans', sans-serif;
    }
    .nav-btn:hover:not(:disabled) { background: var(--surface); border-color: var(--accent2); }
    .nav-btn:disabled { opacity: 0.3; cursor: default; }

    /* ── DOTS ───────────────────────────── */
    .dot-row {
      display: flex; gap: 5px; justify-content: center;
      flex-wrap: wrap; padding: 0 1rem;
    }
    .dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: rgba(255,255,255,0.1);
      transition: all 0.2s; cursor: pointer;
      flex-shrink: 0;
    }
    .dot:hover { background: rgba(255,255,255,0.3); }
    .dot.seen { background: rgba(255,255,255,0.25); }
    .dot.current { background: var(--accent); width: 20px; border-radius: 4px; }

    /* ── COMPLETION BANNER ──────────────── */
    .done-banner {
      display: none; text-align: center; padding: 1.5rem;
      background: linear-gradient(135deg, rgba(232,184,109,0.12), rgba(167,139,250,0.12));
      border: 1px solid rgba(232,184,109,0.25);
      border-radius: var(--radius); margin-top: 1.5rem;
    }
    .done-banner.show { display: block; }
    .done-banner h3 { font-family: 'Playfair Display', serif; font-size: 1.2rem; color: var(--accent); }
    .done-banner p { font-size: 13px; color: var(--muted); margin-top: 0.4rem; }

    @media (max-width: 480px) {
      .card-face { padding: 1.75rem 1.5rem; }
      .toolbar { flex-direction: column; align-items: flex-start; }
    }
  </style>
</head>
<body>
<div class="wrapper">

  <header>
    <div class="eyebrow">Study Tool</div>
    <h1>Grade 9 English</h1>
    <p class="subtitle">The Bitter Side of Sweet &amp; Poetry Terms · 51 cards</p>
  </header>

  <div class="toolbar">
    <div class="tabs" id="tabs"></div>
    <div class="right-tools">
      <button class="shuffle-btn" onclick="shuffle()">⇄ Shuffle</button>
      <span class="progress" id="prog"></span>
    </div>
  </div>

  <div class="card-area">
    <div class="card-wrap" id="card" onclick="flip()">
      <div class="card-face front">
        <div class="card-label">Question</div>
        <div class="card-q" id="q-text"></div>
        <div class="card-category" id="q-cat"></div>
      </div>
      <div class="card-face back">
        <div class="card-label">Answer</div>
        <div class="card-a" id="a-text"></div>
      </div>
    </div>
  </div>

  <p class="flip-hint">Tap to flip <span>·</span> ← → arrow keys to navigate <span>·</span> Space to flip</p>

  <div class="nav-row">
    <button class="nav-btn" id="prev-btn" onclick="go(-1)">← Prev</button>
    <button class="nav-btn" id="next-btn" onclick="go(1)">Next →</button>
  </div>

  <div class="dot-row" id="dots"></div>

  <div class="done-banner" id="done">
    <h3>🎉 Deck complete!</h3>
    <p>You've gone through all the cards. Shuffle for another round.</p>
  </div>

</div>

<script>
const ALL = [
  {cat:"Poetry Terms", q:"What is theme?", a:"The central message or big idea the poem communicates about life or the world."},
  {cat:"Poetry Terms", q:"What is tone?", a:"The speaker's attitude toward the subject — how the speaker feels (e.g. angry, hopeful, bitter)."},
  {cat:"Poetry Terms", q:"What is mood?", a:"The feeling the poem creates in the reader — different from tone, which belongs to the speaker."},
  {cat:"Poetry Terms", q:"What is imagery?", a:"Language that appeals to the five senses — sight, sound, smell, taste, touch — to create vivid mental pictures."},
  {cat:"Poetry Terms", q:"What is symbolism?", a:"When an object, person, or idea represents something beyond its literal meaning (e.g. a chain = slavery)."},
  {cat:"Poetry Terms", q:"What is a metaphor?", a:"A direct comparison between two unlike things without 'like' or 'as' (e.g. 'The farm was a prison')."},
  {cat:"Poetry Terms", q:"What is a simile?", a:"A comparison using 'like' or 'as' (e.g. 'He moved like a shadow through the trees')."},
  {cat:"Poetry Terms", q:"What is repetition?", a:"Repeating words, phrases, or lines to emphasize an idea, create rhythm, or reinforce emotion."},
  {cat:"Poetry Terms", q:"What is a sonnet?", a:"A 14-line poem usually written in iambic pentameter. Shakespearean sonnets have three quatrains (ABAB CDCD EFEF) and a closing couplet (GG). Petrarchan sonnets split into an octave (8 lines) and a sestet (6 lines). Sonnets often explore love, time, or beauty."},
  {cat:"Poetry Terms", q:"What is a haiku?", a:"A traditional Japanese poem of exactly 3 lines and 17 syllables: 5 syllables in line 1, 7 in line 2, and 5 in line 3. Haiku typically focus on a single moment in nature and often include a 'kigo' (seasonal word) and a surprising contrast or turn between the lines."},
  {cat:"Poetry Terms", q:"What is a rhyme scheme?", a:"The pattern of end rhymes in a poem, labelled with letters (e.g. ABAB means lines 1 and 3 rhyme, lines 2 and 4 rhyme). You identify it by giving each new end-sound a new letter."},
  {cat:"Poetry Terms", q:"What are some examples of tone words?", a:"Angry, hopeful, bitter, sorrowful, nostalgic, defiant, celebratory, ironic, melancholic, anxious, reverent, detached. Tone is the speaker's attitude — choose the word that best fits the poem's language and context."},
  {cat:"Poetry Terms", q:"How do you analyse tone in a poem?", a:"Ask: How does the speaker feel? Then find specific words that reveal that attitude (diction, punctuation, exclamations, questions). Justify your tone word with at least two examples from the text."},
  {cat:"Poetry Terms", q:"How do you analyse imagery in a poem?", a:"Look for sensory details (sight, sound, smell, taste, touch) and vivid descriptions. Identify which sense is targeted, quote the image, then explain what feeling or idea it creates for the reader."},
  {cat:"Poetry Terms", q:"How do you analyse symbolism in a poem?", a:"Look for objects or ideas that appear repeatedly or seem too prominent to be purely literal. Ask: what larger concept could this represent? Support your reading with evidence from the poem's context and themes."},
  {cat:"Poetic Structure", q:"How do you identify a poem's rhyme scheme and style?", a:"Read the end word of each line and assign a letter each time a new sound appears (A, B, C…). If no lines rhyme, it is free verse. If it follows ABAB CDCD EFEF GG, it is a Shakespearean sonnet. If it is 5-7-5 syllables in 3 lines, it is a haiku."},
  {cat:"Poetic Structure", q:"What is free verse?", a:"Poetry with no fixed rhyme scheme or meter — relies heavily on imagery and line breaks for effect."},
  {cat:"Poetic Structure", q:"How does structure affect meaning?", a:"Short, choppy lines create tension or urgency. Long, flowing lines feel calm or overwhelming. Structure shapes emotion."},
  {cat:"Poetic Structure", q:"How do punctuation and line breaks influence reading?", a:"A mid-line pause (caesura) creates a shift. Enjambment (no stop at line end) pushes the reader forward and can build suspense."},
  {cat:"Plot", q:"What is life like on the cocoa farm?", a:"The boys work brutal hours cutting cacao pods with machetes, are given barely any food, and are beaten for slowing down or disobeying. They sleep in locked sheds, are watched by the pisteur, and have no contact with the outside world. It is essentially child slavery."},
  {cat:"Plot", q:"Why do the children decide to escape?", a:"Seydou's injury becomes life-threatening. Amadou realizes staying means death or permanent enslavement. Khadija adds urgency — she knows there's no future on the farm."},
  {cat:"Plot", q:"What obstacles do they face during the journey?", a:"Physical: jungle terrain, hunger, Seydou's infected wound. Human: the pisteur tracking them, language barriers. Emotional: fear, guilt, self-doubt."},
  {cat:"Plot", q:"How does the setting contribute to the conflict?", a:"The remote farm isolates the boys completely — no outsiders or escape route. The jungle is a physical obstacle and symbolizes the danger of freedom. The setting hides the exploitation from the world."},
  {cat:"Plot", q:"Which moments are the turning points in the story?", a:"(1) Seydou's injury worsening. (2) Khadija revealing her escape plan. (3) The actual escape through the jungle. (4) Finding a stranger who believes them."},
  {cat:"Plot", q:"What is the central theme of The Bitter Side of Sweet?", a:"Freedom vs. slavery, tied to human dignity. Every person has a right to freedom; exploitation is systemic. Hope and family loyalty allow people to endure and resist."},
  {cat:"Characters", q:"What are Amadou's motivations?", a:"To protect his little brother Seydou at all costs, and eventually to reclaim his own freedom and agency."},
  {cat:"Characters", q:"What are Amadou's character traits?", a:"Protective, responsible, initially passive from fear — but courageous under pressure, resourceful, and burdened by guilt."},
  {cat:"Characters", q:"How does Amadou change throughout the novel?", a:"Starts as someone who endures abuse quietly to keep Seydou safe. By the end he becomes a true leader — making bold decisions, trusting others, and believing escape is worth fighting for."},
  {cat:"Characters", q:"What are Seydou's character traits?", a:"Innocent, trusting, gentle, and quietly resilient. He is younger and more vulnerable than Amadou but never loses his warmth or his bond with his brother, even under extreme suffering."},
  {cat:"Characters", q:"What are Seydou's motivations?", a:"To trust his brother, survive, and hold onto innocence and hope even in brutal conditions."},
  {cat:"Characters", q:"How does Seydou change throughout the novel?", a:"His injury strips away his innocence but reveals inner strength. He becomes an emotional motivation for Amadou rather than just someone to protect."},
  {cat:"Characters", q:"What are Khadija's character traits?", a:"Fierce, independent, street-smart, and guarded. She has survived on the farm longer than the boys and has learned to trust no one — but underneath her hardness is deep pain and a desperate desire for freedom."},
  {cat:"Characters", q:"What are Khadija's motivations?", a:"To escape the farm, survive on her own terms, and avoid being controlled by anyone."},
  {cat:"Characters", q:"How does Khadija change throughout the novel?", a:"Starts as a lone survivor who trusts no one. Over time she learns that survival can mean working together, opening up to Amadou and Seydou."},
  {cat:"Characters", q:"What are Moussa's character traits?", a:"Hardened, self-protective, and complicit. Years of abuse have broken his will to resist. He enforces the bosses' rules to earn small privileges, making him a tragic figure — simultaneously a victim and a source of cruelty toward the other children."},
  {cat:"Characters", q:"How does Moussa change throughout the novel?", a:"He doesn't change in the way the others do — and that is the point. His stagnation shows what happens when hope is completely destroyed. His inability to change contrasts with Amadou's growth and warns of what Amadou could become."},
  {cat:"Characters", q:"What do Moussa's motivations reveal about the novel?", a:"He became complicit with the bosses to earn small privileges. His arc shows how long-term exploitation crushes hope and turns victims against each other."},
  {cat:"Themes", q:"How is Freedom vs. Slavery portrayed in the novel?", a:"The boys are physically trapped and beaten for resistance. Every small act — hiding food, whispering plans — is a reclaiming of freedom."},
  {cat:"Themes", q:"What is Sullivan's message about Freedom vs. Slavery?", a:"Slavery exists today in forms like child trafficking. Freedom must be actively fought for, and those who steal it bear deep moral guilt."},
  {cat:"Themes", q:"How is Hope and Survival portrayed in the novel?", a:"Amadou clings to hope of getting Seydou home. Hope keeps him from giving up even when escape seems impossible."},
  {cat:"Themes", q:"What is Sullivan's message about Hope and Survival?", a:"Hope is not passive — it is an act of resistance. To hope when you have every reason to give up is a form of courage."},
  {cat:"Themes", q:"How is Family and Loyalty portrayed in the novel?", a:"Amadou's love for Seydou drives every major decision. Even with Khadija, loyalty grows into a chosen-family bond."},
  {cat:"Themes", q:"What is Sullivan's message about Family and Loyalty?", a:"Family — biological or chosen — gives people a reason to survive and the strength to resist. Loyalty is what separates humanity from brutality."},
  {cat:"Themes", q:"How is Human Rights and Exploitation portrayed in the novel?", a:"The pisteur system, the bosses' violence, and the world's ignorance of the farms all represent systemic exploitation of children."},
  {cat:"Themes", q:"What is Sullivan's message about Human Rights and Exploitation?", a:"Exploitation thrives in silence and distance. Awareness that every chocolate bar has a supply chain is the first step toward ending injustice."},
  {cat:"Themes", q:"How is Fear and Courage portrayed in the novel?", a:"Fear is constant — of beatings, the jungle, recapture. Courage is not the absence of fear but acting despite it, which Amadou demonstrates repeatedly."},
  {cat:"Themes", q:"What is Sullivan's message about Fear and Courage?", a:"Courage is earned, not given. It grows from love and necessity, and ordinary people — even children — are capable of extraordinary acts."},
  {cat:"Final Review", q:"How does Tara Sullivan create suspense?", a:"Short, urgent sentences during tense moments. Withheld information (will Seydou survive?). Cliffhanger chapter endings. The constant threat of the pisteur."},
  {cat:"Final Review", q:"What role does hope play in the story?", a:"Hope is the engine of the story. Without it Amadou would simply endure. It separates him from Moussa. Sullivan presents hope as a deliberate, painful choice — not naive optimism."},
  {cat:"Final Review", q:"Which character changes the most throughout the story?", a:"Amadou. He begins passive and quiet, surviving by staying invisible. By the end he makes bold decisions, forms alliances, and leads an escape — the emotional core of the novel."},
  {cat:"Final Review", q:"How are freedom and survival connected in the novel?", a:"True survival is impossible without freedom. The boys are alive on the farm but destroyed inside. Sullivan suggests a life without freedom is just a slower form of death."},
];

const CATS = ["All", ...[...new Set(ALL.map(c => c.cat))]];
let active = "All", deck = [], idx = 0, flipped = false;

function getDeck() {
  return active === "All" ? [...ALL] : ALL.filter(c => c.cat === active);
}

function shuffle() {
  deck.sort(() => Math.random() - 0.5);
  idx = 0; flipped = false;
  document.getElementById('card').classList.remove('flipped');
  render();
}

function setActive(cat) {
  active = cat;
  deck = getDeck();
  idx = 0; flipped = false;
  document.getElementById('card').classList.remove('flipped');
  renderTabs();
  render();
}

function flip() {
  flipped = !flipped;
  document.getElementById('card').classList.toggle('flipped', flipped);
}

function go(dir) {
  const next = idx + dir;
  if (next < 0 || next >= deck.length) return;
  idx = next; flipped = false;
  document.getElementById('card').classList.remove('flipped');
  render();
}

function renderTabs() {
  document.getElementById('tabs').innerHTML = CATS.map(c =>
    `<button class="tab${c === active ? ' active' : ''}" onclick="setActive('${c}')">${c}</button>`
  ).join('');
}

function render() {
  const card = deck[idx];
  document.getElementById('q-text').textContent = card.q;
  document.getElementById('q-cat').textContent = card.cat;
  document.getElementById('a-text').textContent = card.a;
  document.getElementById('prog').textContent = `${idx + 1} / ${deck.length}`;
  document.getElementById('prev-btn').disabled = idx === 0;
  document.getElementById('next-btn').disabled = idx === deck.length - 1;

  const dots = document.getElementById('dots');
  dots.innerHTML = deck.map((_, i) =>
    `<div class="dot${i < idx ? ' seen' : i === idx ? ' current' : ''}" onclick="jumpTo(${i})" title="Card ${i+1}"></div>`
  ).join('');

  document.getElementById('done').classList.toggle('show', idx === deck.length - 1 && flipped);
}

function jumpTo(i) {
  idx = i; flipped = false;
  document.getElementById('card').classList.remove('flipped');
  render();
}

deck = getDeck();
renderTabs();
render();

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight') go(1);
  else if (e.key === 'ArrowLeft') go(-1);
  else if (e.key === ' ') { e.preventDefault(); flip(); }
});
</script>
</body>
</html>
